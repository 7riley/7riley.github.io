<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>riley</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
:root{
  --bg:#090c1a;
  --card:#0f1430;
  --accent:#5f6fcf;
  --accent-soft:#9fb6ff;
  --text:#e8ecff;
  --muted:#9aa6da;

  --online:#3ccf91;
  --idle:#f0b232;
  --dnd:#ed6a6a;
  --offline:#5b6285;
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at top,#141a3f,var(--bg));
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--text)
}
.card{
  width:380px;
  background:linear-gradient(180deg,#12184a,var(--card));
  border-radius:18px;
  padding:20px;
  box-shadow:0 30px 80px rgba(0,0,0,.85);
  transition:.60s
}
.card:hover{
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 40px 120px rgba(95,111,207,.35)
}
.header{display:flex;gap:16px;align-items:center}
.avatar-wrap{position:relative;width:96px;height:96px}
.avatar{
  width:96px;height:96px;border-radius:50%;
  border:4px solid var(--card);transition:.60s
}
.avatar:hover{
  transform:scale(1.05);
  box-shadow:0 0 28px rgba(159,182,255,.45)
}
.status-dot{
  position:absolute;bottom:6px;right:6px;
  width:18px;height:18px;border-radius:50%;
  border:3px solid var(--card);background:var(--offline)
}
.status-glow{filter:drop-shadow(0 0 16px currentColor)}

.name{
  font-size:22px;font-weight:900;position:relative;
  background:linear-gradient(120deg,#9fb6ff,#6f7fe8,#4b5acb,#9fb6ff);
  background-size:300% 300%;
  -webkit-background-clip:text;background-clip:text;
  color:transparent;
  animation:gradientMove 8s ease infinite
}
.name::after{
  content:"";position:absolute;inset:-8px;
  background:
    radial-gradient(circle at 30% 25%,rgba(159,182,255,.35),transparent 45%),
    radial-gradient(circle at 75% 70%,rgba(111,127,232,.25),transparent 50%);
  opacity:.45;filter:blur(8px);
  animation:sparkle 4.5s ease-in-out infinite
}
@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
@keyframes sparkle{
  0%,100%{opacity:.35}
  50%{opacity:.75}
}

.about{margin-top:14px;color:var(--muted);font-size:14px}
.socials{display:flex;gap:10px;margin-top:16px}
.socials a{
  flex:1;padding:10px 0;text-align:center;border-radius:12px;
  background:rgba(159,182,255,.08);
  color:var(--text);transition:.60s
}
.socials a:hover{
  background:rgba(95,111,207,.35);
  transform:translateY(-2px)
}

.spotify{
  margin-top:18px;background:rgba(9,12,26,.7);
  border-radius:14px;padding:12px;
  display:none;transition:.60s
}
.spotify:hover{background:rgba(95,111,207,.22)}
.spotify.active{display:block}
.spotify-row{display:flex;gap:10px;align-items:center}
.spotify img{width:48px;height:48px;border-radius:6px}

.track-title{font-weight:700;display:flex;align-items:center;gap:8px}
.music-ico{width:14px;height:14px;display:inline-flex;color:var(--accent-soft)}
.music-ico svg{width:14px;height:14px;fill:currentColor}
.track-artist{font-size:12px;color:var(--muted)}

.bar{
  height:4px;background:rgba(159,182,255,.2);
  border-radius:999px;overflow:hidden;margin-top:6px
}
.bar>div{
  height:100%;
  background:linear-gradient(90deg,#4b5acb,#9fb6ff);
  width:0%;
  transition: width 1s cubic-bezier(.4,0,.2,1);

}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="avatar-wrap">
      <img class="avatar" id="avatar" />
      <div class="status-dot" id="statusDot"></div>
    </div>
    <div class="name">riley</div>
  </div>

  <div class="about">i love my girlfriend she's so pretty omg she's so amazing</div>

  <div class="socials">
    <a href="https://open.spotify.com/user/31kcl3foiantv5wvv4cryp2k5pbi" target="_blank"><i class="fa-brands fa-spotify"></i></a>
    <a href="https://discord.com/users/1142433636822548601" target="_blank"><i class="fa-brands fa-discord"></i></a>
    <a href="https://www.last.fm/user/meowriley" target="_blank"><i class="fa-brands fa-lastfm"></i></a>
    <a href="https://tiktok.com/@rileysc" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
    <a href="https://youtube.com/@2riley" target="_blank"><i class="fa-brands fa-youtube"></i></a>
  </div>

  <div class="spotify" id="spotify">
    <div class="spotify-row">
      <img id="spCover" />
      <div>
        <div class="track-title">
          <span class="music-ico">
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h6V3h-8z"/></svg>
          </span>
          <span id="spTitle"></span>
        </div>
        <div class="track-artist" id="spArtist"></div>
      </div>
    </div>
    <div class="bar"><div id="spBar"></div></div>
  </div>

  <div class="spotify" id="lastfm">
    <div class="spotify-row">
      <img id="lfCover" />
      <div>
        <div class="track-title">
          <span class="music-ico">
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h6V3h-8z"/></svg>
          </span>
          <span id="lfTitle"></span>
        </div>
        <div class="track-artist" id="lfArtist"></div>
      </div>
    </div>
  </div>
</div>

<script>
const ID="1142433636822548601";

const avatar=document.getElementById("avatar");
const statusDot=document.getElementById("statusDot");
const spotify=document.getElementById("spotify");
const lastfm=document.getElementById("lastfm");
const spCover=document.getElementById("spCover");
const spTitle=document.getElementById("spTitle");
const spArtist=document.getElementById("spArtist");
const spBar=document.getElementById("spBar");
const lfCover=document.getElementById("lfCover");
const lfTitle=document.getElementById("lfTitle");
const lfArtist=document.getElementById("lfArtist");

const map={online:"--online",idle:"--idle",dnd:"--dnd",offline:"--offline"};

let spStart=0;
let spEnd=0;
let hasSpotify=false;

function updateProgress(){
  if(!hasSpotify||!spStart||!spEnd)return;
  const p=(Date.now()-spStart)/(spEnd-spStart)*100;
  spBar.style.width=`${Math.min(Math.max(p,0),100)}%`;
}

async function update(){
  try{
    const r=await fetch(`https://api.lanyard.rest/v1/users/${ID}`);
    const d=(await r.json()).data;

    avatar.src=`https://cdn.discordapp.com/avatars/${ID}/${d.discord_user.avatar}.png?size=256`;

    const s=d.discord_status;
    statusDot.style.background=`var(${map[s]||"--offline"})`;
    statusDot.style.color=`var(${map[s]||"--offline"})`;
    statusDot.classList.toggle("status-glow",s!=="offline");

    if(d.spotify){
      hasSpotify=true;
      spStart=d.spotify.timestamps.start;
      spEnd=d.spotify.timestamps.end;

      spotify.classList.add("active");
      lastfm.classList.remove("active");

      spCover.src=d.spotify.album_art_url;
      spTitle.textContent=d.spotify.song;
      spArtist.textContent=d.spotify.artist;

      updateProgress();
    }else{
      hasSpotify=false;
      spotify.classList.remove("active");

      const lf=await fetch(
        "https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=meowriley&api_key=3d6ecb8ab9fbf9cd47660eb96b9919b9&format=json&limit=1"
      );
      const t=(await lf.json()).recenttracks.track[0];
      lastfm.classList.add("active");
      lfCover.src=t.image.pop()["#text"];
      lfTitle.textContent=t.name;
      lfArtist.textContent=t.artist["#text"];
    }
  }catch{
    spotify.classList.remove("active");
    lastfm.classList.remove("active");
  }
}

update();
setInterval(update,15000);
setInterval(updateProgress,1000);
</script>
</body>
</html>
