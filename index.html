<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>riley</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
:root{
  --bg:#120b12;--card:#2a1622;--accent:#b36cff;--text:#f2e9f4;--muted:#c6b3c9;
  --online:#23a55a;--idle:#f0b232;--dnd:#ed4245;--offline:#747f8d;
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at top,#2b1630,var(--bg));
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text)
}
.card{
  width:380px;background:linear-gradient(180deg,#3a1d2c,var(--card));
  border-radius:18px;padding:20px;box-shadow:0 30px 80px rgba(0,0,0,.7);
  transition:.25s
}
.card:hover{
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 40px 120px rgba(179,108,255,.25)
}
.header{display:flex;gap:16px;align-items:center}
.avatar-wrap{position:relative;width:96px;height:96px}
.avatar{
  width:96px;height:96px;border-radius:50%;border:4px solid var(--card);
  transition:.25s
}
.avatar:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(179,108,255,.45)
}
.status-dot{
  position:absolute;bottom:6px;right:6px;width:18px;height:18px;border-radius:50%;
  border:3px solid var(--card);background:var(--offline)
}
.status-glow{filter:drop-shadow(0 0 12px currentColor)}

.name{
  font-size:22px;
  font-weight:800;
  position:relative;
  background:linear-gradient(
    120deg,
    #ffb3ff,
    #c77dff,
    #7dd3ff,
    #ffb3ff
  );
  background-size:300% 300%;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  animation:gradientMove 6s ease infinite;
}

.name::after{
  content:"";
  position:absolute;
  inset:-6px;
  background:
    radial-gradient(circle at 20% 30%,rgba(255,255,255,.35),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(255,255,255,.25),transparent 45%);
  opacity:.6;
  filter:blur(6px);
  pointer-events:none;
  animation:sparkle 3.5s ease-in-out infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

@keyframes sparkle{
  0%,100%{opacity:.4}
  50%{opacity:.85}
}

.about{margin-top:14px;color:var(--muted);font-size:14px}
.socials{display:flex;gap:10px;margin-top:16px}
.socials a{
  flex:1;padding:10px 0;text-align:center;border-radius:12px;
  background:rgba(255,255,255,.08);color:var(--text);transition:.15s
}
.socials a:hover{
  background:rgba(179,108,255,.25);
  transform:translateY(-2px)
}
.spotify{
  margin-top:18px;background:rgba(0,0,0,.25);
  border-radius:14px;padding:12px;display:none;transition:.2s
}
.spotify:hover{background:rgba(179,108,255,.18)}
.spotify.active{display:block}
.spotify-row{display:flex;gap:10px;align-items:center}
.spotify img{width:48px;height:48px;border-radius:6px}
.track-title{
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px
}
.music-ico{
  width:14px;height:14px;display:inline-flex;
  color:var(--text);opacity:.9
}
.music-ico svg{width:14px;height:14px;fill:currentColor}
.track-artist{font-size:12px;color:var(--muted)}
.bar{
  height:4px;background:rgba(255,255,255,.2);
  border-radius:999px;overflow:hidden;margin-top:6px
}
.bar>div{height:100%;background:#1db954;width:0%}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="avatar-wrap">
      <img class="avatar" id="avatar" />
      <div class="status-dot" id="statusDot"></div>
    </div>
    <div class="name">riley</div>
  </div>

  <div class="about">i love my girlfriend &lt;3</div>

  <div class="socials">
    <a href="https://open.spotify.com/user/31kcl3foiantv5wvv4cryp2k5pbi" target="_blank"><i class="fa-brands fa-spotify"></i></a>
    <a href="https://discord.com/users/1142433636822548601" target="_blank"><i class="fa-brands fa-discord"></i></a>
    <a href="https://www.last.fm/user/meowriley" target="_blank"><i class="fa-brands fa-lastfm"></i></a>
    <a href="https://tiktok.com/@rileysc" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
  </div>

  <div class="spotify" id="spotify">
    <div class="spotify-row">
      <img id="spCover" />
      <div>
        <div class="track-title">
          <span class="music-ico">
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h6V3h-8z"/></svg>
          </span>
          <span id="spTitle"></span>
        </div>
        <div class="track-artist" id="spArtist"></div>
      </div>
    </div>
    <div class="bar"><div id="spBar"></div></div>
  </div>

  <div class="spotify" id="lastfm">
    <div class="spotify-row">
      <img id="lfCover" />
      <div>
        <div class="track-title">
          <span class="music-ico">
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h6V3h-8z"/></svg>
          </span>
          <span id="lfTitle"></span>
        </div>
        <div class="track-artist" id="lfArtist"></div>
      </div>
    </div>
  </div>
</div>

<script>
const ID="1142433636822548601";
const avatar=document.getElementById("avatar");
const statusDot=document.getElementById("statusDot");
const spotify=document.getElementById("spotify");
const lastfm=document.getElementById("lastfm");
const spCover=document.getElementById("spCover");
const spTitle=document.getElementById("spTitle");
const spArtist=document.getElementById("spArtist");
const spBar=document.getElementById("spBar");
const lfCover=document.getElementById("lfCover");
const lfTitle=document.getElementById("lfTitle");
const lfArtist=document.getElementById("lfArtist");
const map={online:"--online",idle:"--idle",dnd:"--dnd",offline:"--offline"};

async function update(){
  try{
    const r=await fetch(`https://api.lanyard.rest/v1/users/${ID}`);
    const d=(await r.json()).data;
    avatar.src=`https://cdn.discordapp.com/avatars/${ID}/${d.discord_user.avatar}.png?size=256`;
    const s=d.discord_status;
    statusDot.style.background=`var(${map[s]||"--offline"})`;
    statusDot.style.color=`var(${map[s]||"--offline"})`;
    statusDot.classList.toggle("status-glow",s!=="offline");

    if(d.spotify){
      spotify.classList.add("active");
      lastfm.classList.remove("active");
      spCover.src=d.spotify.album_art_url;
      spTitle.textContent=d.spotify.song;
      spArtist.textContent=d.spotify.artist;
      const p=(Date.now()-d.spotify.timestamps.start)/(d.spotify.timestamps.end-d.spotify.timestamps.start)*100;
      spBar.style.width=`${Math.min(p,100)}%`;
    }else{
      spotify.classList.remove("active");
      const lf=await fetch("https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=meowriley&api_key=3d6ecb8ab9fbf9cd47660eb96b9919b9&format=json&limit=1");
      const t=(await lf.json()).recenttracks.track[0];
      lastfm.classList.add("active");
      lfCover.src=t.image.pop()["#text"];
      lfTitle.textContent=t.name;
      lfArtist.textContent=t.artist["#text"];
    }
  }catch{
    spotify.classList.remove("active");
    lastfm.classList.remove("active");
  }
}
update();
setInterval(update,15000);
</script>
</body>
</html>
