<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
  --bg:#070707;
  --border:rgba(255,255,255,.08);
  --text:#f1f1f1;
  --muted:rgba(255,255,255,.78);
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  color:var(--text);
  background:
    radial-gradient(1000px 500px at 50% -10%, rgba(255,255,255,.06), transparent 55%),
    #070707;
  display:grid;
  place-items:center;
}

.enter-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:grid;
  place-items:center;
  z-index:9999;
  cursor:pointer;
  transition:opacity 420ms ease;
}
.enter-text{
  padding:10px 18px;
  font-weight:800;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.12);
  color:#fff;
  text-shadow:0 0 8px rgba(255,255,255,.35);
  animation:breathe 2.6s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:.8}50%{opacity:1}}
.enter-overlay.exit{opacity:0;pointer-events:none}

.card{
  width:620px;
  max-width:92vw;
  padding:54px 22px 22px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015));
  border:1px solid var(--border);
  box-shadow:0 22px 55px rgba(0,0,0,.6);
  position:relative;
  transition:transform 260ms ease, box-shadow 260ms ease;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 20px 55px rgba(0,0,0,.55);
}

.topStats{
  position:absolute;
  top:14px;
  right:16px;
  display:flex;
  gap:10px;
  font-weight:700;
  font-size:14px;
  opacity:.85;
}
.topStats .sep{
  width:1px;
  background:rgba(255,255,255,.18);
}

.pfp{
  position:absolute;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  width:86px;
  height:86px;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 18px 50px rgba(0,0,0,.65);
}
.pfp img{width:100%;height:100%;object-fit:cover}

.center{
  margin-top:56px;
  text-align:center;
}
.name{
  font-size:34px;
  font-weight:850;
  text-shadow:0 0 14px rgba(255,255,255,.25);
}
.bio{
  margin-top:8px;
  font-weight:700;
  color:var(--muted);
}
.caret{
  border-right:2px solid rgba(255,255,255,.7);
  margin-left:2px;
  animation:blink .9s steps(1) infinite;
}
@keyframes blink{50%{opacity:0}}

.icons{
  margin-top:18px;
  display:flex;
  justify-content:center;
  gap:14px;
}
.icon{
  width:44px;height:44px;
  display:grid;place-items:center;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  color:#fff;
  transition:transform .2s ease, box-shadow .2s ease;
  text-decoration:none;
}
.icon:hover{
  transform:translateY(-2px);
  box-shadow:0 0 18px rgba(255,255,255,.3);
}

.player{
  margin-top:18px;
  padding:14px;
  border-radius:14px;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.06);
  display:flex;
  gap:12px;
  align-items:center;
}
.cover{
  width:52px;height:52px;
  border-radius:12px;
  overflow:hidden;
  flex:0 0 auto;
}
.cover img{width:100%;height:100%;object-fit:cover}
.track{
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:8px;
}
.bar{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  opacity:.7;
}

input[type=range]{
  width:100%;
  -webkit-appearance:none;
  appearance:none;
  height:3px;
  background:#000;
  border-radius:999px;
  outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:10px;height:10px;
  border-radius:50%;
  background:#000;
  cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:10px;height:10px;
  border-radius:50%;
  background:#000;
  cursor:pointer;
}

.btn{
  background:none;
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  color:#fff;
  width:32px;height:32px;
  cursor:pointer;
}
.btn:active{transform:scale(.97)}
</style>
</head>

<body>

<div class="enter-overlay" id="enter"><div class="enter-text">[ click ]</div></div>

<div class="card">
  <div class="topStats">
    <div><i class="fa-regular fa-clock"></i> <span id="utc">00:00:00</span></div>
    <div class="sep"></div>
    <div><i class="fa-solid fa-location-dot"></i> England, UK</div>
  </div>

  <div class="pfp">
    <img id="pfpImg" src="avatar.jpg" alt="pfp" onerror="this.src='https://picsum.photos/256?blur=2'">
  </div>

  <div class="center">
    <div class="name" id="name">riley</div>
    <div class="bio"><span id="type"></span><span class="caret"></span></div>

    <div class="icons">
      <a class="icon" href="https://discord.com/users/1142433636822548601" target="_blank" rel="noreferrer"><i class="fa-brands fa-discord"></i></a>
      <a class="icon" href="https://github.com/7riley" target="_blank" rel="noreferrer"><i class="fa-brands fa-github"></i></a>
      <a class="icon" href="https://tiktok.com/@rileysc" target="_blank" rel="noreferrer"><i class="fa-brands fa-tiktok"></i></a>
    </div>

    <div class="player">
      <div class="cover">
        <img id="coverImg" src="Till I Die.png" alt="cover">
      </div>

      <div style="flex:1; min-width:0">
        <div class="track" id="trackTitle">Till I Die - Ken Carson</div>
        <div class="bar">
          <span id="cur">0:00</span>
          <input id="seek" type="range" min="0" max="1000" value="0">
          <span id="dur">0:00</span>
        </div>
      </div>

      <button class="btn" id="prev"><i class="fa-solid fa-backward-step"></i></button>
      <button class="btn" id="play"><i class="fa-solid fa-play"></i></button>
      <button class="btn" id="next"><i class="fa-solid fa-forward-step"></i></button>
    </div>

    <audio id="audio" preload="metadata"></audio>
  </div>
</div>

<script>
const PLAYLIST = [
  { title: "Till I Die", artist: "Ken Carson", src: "Till I Die.mp3", cover: "Till I Die.png" },
  { title: "overseas", artist: "Ken Carson", src: "overseas.mp3", cover: "overseas.png" },
  { title: "MM3", artist: "SoFaygo", src: "MM3.mp3", cover: "MM3.png" },
  { title: "scissor knife sword", artist: "confetti", src: "scissor knife sword.mp3", cover: "scissor knife sword.png" },
  { title: "Asphalt", artist: "Protect", src: "Asphalt.mp3", cover: "Asphalt.png" },
  { title: "american baddie", artist: "sayso", src: "american baddie.mp3", cover: "american baddie.png" },
  { title: "Caraphernelia", artist: "Pierce The Veil", src: "Caraphernelia.mp3", cover: "Caraphernelia.png" },
  { title: "idk wtf", artist: "prettifun", src: "idk wtf.mp3", cover: "idk wtf.png" }
];

let trackIndex = 0;

function pad(n){return String(n).padStart(2,'0')}
function tickUTC(){
  const d=new Date();
  utc.textContent=`${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}`;
}
tickUTC(); setInterval(tickUTC,1000);

const typeText="16, UK", typeEl=document.getElementById("type");
const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));
(async()=>{
  while(true){
    for(let i=1;i<=typeText.length;i++){ typeEl.textContent=typeText.slice(0,i); await sleep(80); }
    await sleep(1200);
    for(let i=typeText.length;i>=0;i--){ typeEl.textContent=typeText.slice(0,i); await sleep(50); }
    await sleep(500);
  }
})();

fetch("https://api.lanyard.rest/v1/users/1142433636822548601",{cache:"no-store"})
  .then(r=>r.json())
  .then(j=>{
    const u=j?.data?.discord_user;
    if(!u) return;
    name.textContent=u.global_name||u.username||"user";
    if(u.avatar){
      pfpImg.src=`https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png?size=256`;
    }
  })
  .catch(()=>{});

const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");
const seek = document.getElementById("seek");
const curEl = document.getElementById("cur");
const durEl = document.getElementById("dur");
const titleEl = document.getElementById("trackTitle");
const coverEl = document.getElementById("coverImg");

audio.volume = 0.25;

function fmt(s){
  if(!isFinite(s)) return "0:00";
  const m=Math.floor(s/60), r=Math.floor(s%60);
  return `${m}:${String(r).padStart(2,"0")}`;
}
function setPlayIcon(playing){
  playBtn.innerHTML = playing ? '<i class="fa-solid fa-pause"></i>' : '<i class="fa-solid fa-play"></i>';
}

function loadTrack(i, autoplay=false){
  if(!PLAYLIST.length) return;
  trackIndex = (i + PLAYLIST.length) % PLAYLIST.length;
  const t = PLAYLIST[trackIndex];
  titleEl.textContent = t.artist && t.title ? `${t.title} - ${t.artist}` : (t.title || "song");
  coverEl.src = t.cover || "cover.png";
  curEl.textContent = "0:00";
  durEl.textContent = "0:00";
  seek.value = 0;
  audio.src = t.src;
  audio.load();
  if(autoplay){
    audio.play().catch(()=>{});
  }
}

prevBtn.addEventListener("click", ()=>{
  const shouldAutoplay = !audio.paused;
  loadTrack(trackIndex - 1, shouldAutoplay);
});

nextBtn.addEventListener("click", ()=>{
  const shouldAutoplay = !audio.paused;
  loadTrack(trackIndex + 1, shouldAutoplay);
});

playBtn.addEventListener("click", async ()=>{
  try{
    if(audio.paused) await audio.play();
    else audio.pause();
  }catch{}
});

audio.addEventListener("play", ()=>setPlayIcon(true));
audio.addEventListener("pause", ()=>setPlayIcon(false));

audio.addEventListener("loadedmetadata", ()=>{
  durEl.textContent = fmt(audio.duration);
});

audio.addEventListener("timeupdate", ()=>{
  curEl.textContent = fmt(audio.currentTime);
  if(isFinite(audio.duration) && audio.duration > 0){
    seek.value = Math.floor((audio.currentTime / audio.duration) * 1000);
  }
});

seek.addEventListener("input", ()=>{
  if(isFinite(audio.duration) && audio.duration > 0){
    audio.currentTime = (seek.value/1000) * audio.duration;
  }
});

audio.addEventListener("ended", ()=>{
  loadTrack(trackIndex + 1, true);
});

loadTrack(0, false);

enter.onclick = async ()=>{
  enter.classList.add("exit");
  setTimeout(()=>enter.remove(),500);
  try{ await audio.play(); }catch{}
};
</script>

</body>
</html>
